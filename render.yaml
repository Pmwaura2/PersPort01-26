services:
  - type: web
    name: peter-mwaura-portfolio
    runtime: python
    plan: free
    buildCommand: "true"
    startCommand: python app.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project/src
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
