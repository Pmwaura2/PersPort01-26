<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P/M | Sign In</title>
    <meta
      name="description"
      content="Private sign-in."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./site.css" />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </head>
  <body data-page="admin-login">
    <div class="page-shell">
      <main class="admin-layout">
        <section class="panel">
          <p class="eyebrow">Admin Access</p>
          <h1>Sign in</h1>
          <p class="lede">
            Private access only.
          </p>
          <form id="admin-login-form" class="field-grid">
            <label class="field">
              <span>Username</span>
              <input id="admin-username" type="text" autocomplete="username" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input id="admin-password" type="password" autocomplete="current-password" required />
            </label>
            <div class="admin-actions">
              <button class="button button-primary" type="submit">Sign In</button>
              <a class="button button-ghost" href="./index.html">Back to site</a>
            </div>
          </form>
          <p id="admin-login-status" class="admin-status"></p>
        </section>
      </main>
    </div>

    <script src="./admin-login.js"></script>
  </body>
</html>
